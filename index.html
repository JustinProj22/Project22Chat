<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Workshop Manager Messages</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --orange: #fb8700;
    --orange-light: #ffe8cc;
    --green: #388e3c;
    --bg: #f5f5f5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Login screen ---------- */
  #loginScreen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #loginScreen h1 {
    color: var(--orange);
    font-size: 1.4rem;
    margin-bottom: 24px;
    text-align: center;
  }

  #loginForm {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input {
    font-size: 1rem;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }

  button {
    font-size: 1rem;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--orange);
    color: white;
    font-weight: 600;
    cursor: pointer;
  }

  button:active { opacity: 0.85; }

  /* ---------- App screen ---------- */
  #appScreen {
    display: none;
    flex: 1;
    flex-direction: column;
    height: 100vh;
  }

  header {
    background: var(--orange);
    color: white;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
  }

  header button {
    background: rgba(255,255,255,0.2);
    padding: 6px 12px;
    font-size: 0.85rem;
  }

  #openConvoForm {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: white;
    border-bottom: 1px solid #ddd;
  }

  #openConvoForm input { flex: 1; }
  #openConvoForm button { white-space: nowrap; }

  #messageList {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .no-messages {
    text-align: center;
    color: #999;
    padding: 50px 20px;
  }

  .message-container {
    margin-bottom: 12px;
    padding: 10px 12px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }

  .message-container.current-user {
    background: var(--orange-light);
  }

  .message-header {
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .sender-name {
    font-weight: bold;
    font-size: 0.8rem;
  }

  .sender-name.current-user { color: var(--orange); }
  .sender-name.other-user { color: var(--green); }

  .timestamp {
    color: #888;
    font-size: 0.7rem;
  }

  .message-text {
    font-size: 0.95rem;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  #messageForm {
    display: flex;
    gap: 8px;
    padding: 10px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: white;
    border-top: 1px solid #ddd;
  }

  #messageInput { flex: 1; }
  #messageForm button { padding: 12px 18px; }
</style>
</head>
<body>

<div id="loginScreen">
  <h1>Workshop Manager Messages</h1>
  <form id="loginForm">
    <input type="text" id="userIdInput" placeholder="Your User ID" autocomplete="off" required>
    <button type="submit">Log in</button>
  </form>
</div>

<div id="appScreen">
  <header>
    <span>Logged in: <span id="currentUserLabel"></span></span>
    <button id="logoutBtn" type="button">Log out</button>
  </header>

  <form id="openConvoForm">
    <input type="text" id="convoIdInput" placeholder="Conversation ID (temporary)" autocomplete="off">
    <button type="submit">Open</button>
  </form>

  <div id="messageList">
    <div class="no-messages">Open a conversation to view messages</div>
  </div>

  <form id="messageForm">
    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
    <button type="submit">Send</button>
  </form>
</div>

<script src="app.js"></script>
</body>
</html>
